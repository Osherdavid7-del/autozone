<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אוטוזון - רכבים לכל מטרה</title>
    <style>
        html { scroll-behavior: smooth; }
        
        /* הגדרת הרקע השקוף על תמונה */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 0;
            /* כאן אנחנו מגדירים את תמונת הרקע */
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed; /* התמונה נשארת קבועה כשגוללים */
            color: white;
            text-align: center;
        }

        /* השכבה השחורה החצי-שקופה שמכסה את כל העמוד */
        .page-overlay {
            background-color: rgba(0, 0, 0, 0.85); /* 85% שחור שקוף */
            min-height: 100vh;
            width: 100%;
        }

        /* עיצוב הכותרת (Header) */
        header {
            padding: 100px 20px;
            border-bottom: 3px solid #e1b154; /* פס זהב */
        }
        h1 { font-size: 3.5rem; color: #e1b154; margin: 0; }
        .hero-text { font-size: 2.2rem; font-weight: bold; margin: 30px 0 10px; }
        .motto { font-size: 1.3rem; margin-bottom: 40px; font-weight: 300; max-width: 800px; margin-left: auto; margin-right: auto; line-height: 1.4; }
        
        /* גלריית הרכבים */
        .gallery-title { font-size: 2.5rem; color: #e1b154; margin: 60px 0 30px; }
        .cars-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .car-card { background: rgba(37, 40, 44, 0.9); border-radius: 12px; border: 1px solid #333; transition: 0.3s; padding: 15px; overflow: hidden; }
        .car-card:hover { border-color: #e1b154; transform: translateY(-5px); }
        .car-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
        .car-details { padding: 15px; text-align: right; border-top: 1px solid #333; margin-top: 10px; }
        .car-name { font-size: 1.4rem; color: #e1b154; font-weight: bold; margin-bottom: 5px; }
        .car-price { font-size: 1.3rem; color: #fff; font-weight: bold; margin-bottom: 15px; }
        
        /* כפתורי וואטסאפ */
        .btn-whatsapp-car { display: inline-block; background-color: #25d366; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .contact-btn { display: inline-block; background-color: #e1b154; color: black; padding: 15px 35px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 1.3rem; margin-top: 40px; display: inline-flex; align-items: center; gap: 10px; }

        footer { background: black; padding: 30px; border-top: 2px solid #e1b154; }
    </style>
</head>
<body>

    <div class="page-overlay">

        <header>
            <h1>AUTOZONE</h1>
            <div class="hero-text">אוטוזון - רכבים לכל מטרה</div>
            <div class="motto">מגוון עצום של רכבים לכל תקציב: ג'יפים חזקים, רכבי 7 מקומות למשפחה, רכבי עבודה, מכוניות זולות ומכוניות יוקרה.</div>
        </header>

        <h2 id="gallery" class="gallery-title">הרכבים למכירה</h2>
        
        <div class="cars-grid">
            <div class="car-card">
                <img src="car1.jpg" alt="יונדאי טוסון">
                <div class="car-details">
                    <div class="car-name">יונדאי טוסון 2022</div>
                    <div class="car-price">145,000 ₪</div>
                    <a href="https://wa.me/972525252428?text=אני%20מעוניין%20ביונדאי%20טוסון%202022" class="btn-whatsapp-car">אני מעוניין ברכב זה</a>
                </div>
            </div>
            </div>

        <footer>
            <div style="font-size: 1.4rem; color: #e1b154; margin-bottom: 15px; direction: ltr;">052-525-2428</div>
            <p>בואו לאוטוזון אשקלון ונמצא לכם את הרכב המושלם</p>
            <a href="https://wa.me/972525252428" class="contact-btn">
                <span>💬</span> דברו איתנו בוואטסאפ
            </a>
        </footer>

    </div> </body>
</html>
